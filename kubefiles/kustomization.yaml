apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Default configuration uses quay.io images (ready to deploy without building)
# To use OpenShift internal registry instead: kubectl apply -k overlays/openshift

resources:
# Operators (install first)
- serverless-subscription.yaml
- strimzi-subscription.yaml
# Knative Serving (requires serverless operator)
- knative-serving.yaml
# Kafka cluster (requires strimzi operator)
- kafka-strimzi.yaml
# Database (includes dummy postgresql secret - don't do this in production)
- postgresql.yaml
# Application config
- configs/configmap-example.yaml
# Application services (using quay.io images by default)
- ingester.knative.yaml
- processor.knative.yaml
- ui.knative.yaml



