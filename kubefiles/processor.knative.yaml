---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/name: cameldemo-processor
    app.kubernetes.io/version: 1.0.1
  name: cameldemo-processor
  annotations:
    argocd.argoproj.io/sync-wave: "4"
---
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: cameldemo-processor
    app.kubernetes.io/version: 1.0.1
    app.kubernetes.io/part-of: cameldemo
  name: cameldemo-processor
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cameldemo-processor
        app.kubernetes.io/version: 1.0.1
      annotations:
        autoscaling.knative.dev/minScale: '1'
        autoscaling.knative.dev/maxScale: '1'
    spec:
      containerConcurrency: 0
      containers:
        - image: quay.io/kevindubois/cameldemo-processor:1.0.1
          envFrom:
            - configMapRef:
                name: appconfig
            - secretRef:
                name: postgresql
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /q/health/live
              port: 0
              scheme: HTTP
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 10
          imagePullPolicy: IfNotPresent
          name: cameldemo-processor
          ports:
            - containerPort: 8080
              name: http1
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /q/health/ready
              port: 0
              scheme: HTTP
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 10
      serviceAccountName: cameldemo-processor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: processor-view-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "4"
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cameldemo-processor-view
  annotations:
    argocd.argoproj.io/sync-wave: "4"
roleRef:
  kind: ClusterRole
  apiGroup: rbac.authorization.k8s.io
  name: view
subjects:
  - kind: ServiceAccount
    name: cameldemo-processor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cameldemo-processor-view-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "4"
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: processor-view-secrets
subjects:
  - kind: ServiceAccount
    name: cameldemo-processor
