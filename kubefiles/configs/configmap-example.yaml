apiVersion: v1
kind: ConfigMap
metadata:
  name: appconfig
  namespace: cameldemo
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
  KAFKA_BOOTSTRAP_SERVERS: "my-cluster-kafka-bootstrap:9092"
  # Optional: Specify external URLs for ingester and processor services
  # If not specified, the UI will auto-detect them based on the current request URL
  # ingester.url: "https://cameldemo-ingester-cameldemo.apps.<cluster-domain>"
  # processor.url: "https://cameldemo-processor-cameldemo.apps.<cluster-domain>"