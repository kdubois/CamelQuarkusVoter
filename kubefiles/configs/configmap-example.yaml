apiVersion: v1
kind: ConfigMap
metadata:
  name: appconfig
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
  KAFKA_BOOTSTRAP_SERVERS: "my-cluster-kafka-bootstrap:9092"
  # For internal cluster communication (recommended):
  ingester.url: "http://cameldemo-ingester.cameldemo.svc.cluster.local"
  processor.url: "http://cameldemo-processor.cameldemo.svc.cluster.local"
  # For external routes, use format: https://cameldemo-ingester-cameldemo.apps.<cluster-domain>