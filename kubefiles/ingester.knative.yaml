---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/name: cameldemo-ingester
    app.kubernetes.io/version: 1.0.1
  name: cameldemo-ingester
  namespace: cameldemo
  annotations:
    argocd.argoproj.io/sync-wave: "4"
---
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: cameldemo-ingester
    app.kubernetes.io/version: 1.0.1
    app.kubernetes.io/part-of: cameldemo
  name: cameldemo-ingester
  namespace: cameldemo
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cameldemo-ingester
        app.kubernetes.io/version: 1.0.1
        app.kubernetes.io/part-of: cameldemo
      annotations:
        autoscaling.knative.dev/target: '5'
        autoscaling.knative.dev/targetUtilizationPercentage: '70'
        autoscaling.knative.dev/window: 15s
    spec:
      containerConcurrency: 2
      containers:
        - image: quay.io/kevindubois/cameldemo-ingester:1.0.1
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: appconfig
            - secretRef:
                name: postgresql
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /q/health/live
              port: 0
              scheme: HTTP
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 10
          name: cameldemo-ingester
          ports:
            - containerPort: 8080
              name: http1
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /q/health/ready
              port: 0
              scheme: HTTP            
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 10
      serviceAccountName: cameldemo-ingester
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ingester-view-secrets
  namespace: cameldemo
  annotations:
    argocd.argoproj.io/sync-wave: "4"
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cameldemo-ingester-view
  namespace: cameldemo
  annotations:
    argocd.argoproj.io/sync-wave: "4"
roleRef:
  kind: ClusterRole
  apiGroup: rbac.authorization.k8s.io
  name: view
subjects:
  - kind: ServiceAccount
    name: cameldemo-ingester
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cameldemo-ingester-view-secrets
  namespace: cameldemo
  annotations:
    argocd.argoproj.io/sync-wave: "4"
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: ingester-view-secrets
subjects:
  - kind: ServiceAccount
    name: cameldemo-ingester
