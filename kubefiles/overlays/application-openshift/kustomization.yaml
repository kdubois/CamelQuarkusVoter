apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Application overlay for OpenShift internal registry
# Usage: kubectl apply -k kubefiles/overlays/application-openshift

resources:
- ../../base/application

# Replace quay.io images with OpenShift internal registry images
images:
- name: quay.io/kevindubois/cameldemo-ingester
  newName: image-registry.openshift-image-registry.svc:5000/cameldemo/cameldemo-ingester
  newTag: "1.0.2"
- name: quay.io/kevindubois/cameldemo-processor
  newName: image-registry.openshift-image-registry.svc:5000/cameldemo/cameldemo-processor
  newTag: "1.0.2"
- name: quay.io/kevindubois/cameldemo-ui
  newName: image-registry.openshift-image-registry.svc:5000/cameldemo/cameldemo-ui
  newTag: "1.0.2"
- name: quay.io/kevindubois/cameldemo-twitter
  newName: image-registry.openshift-image-registry.svc:5000/cameldemo/cameldemo-twitter
  newTag: "1.0.2"

# Made with Bob
